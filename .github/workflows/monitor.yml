name: Instagram Multi-Account Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          MANAGEMENT_BOT_TOKEN: ${{ secrets.MANAGEMENT_BOT_TOKEN }}
          OWNER_CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add accounts.json state.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "update accounts/state"
          git push
